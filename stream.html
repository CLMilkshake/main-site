<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LCT Tournament</title>
  <link rel="stylesheet" href="style.css?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <header>
    <div class="logo">
      <a href="/"><h2>Milkshake Lab Productions</h2></a>
    </div>
    <div class="nav-left">
      <a href="https://clmilkshake.cc">Home</a>
      <a href="#">Stream</a>
      <a href="https://clmilkshake.cc/info.html">Info</a>
      <a href="https://clmilkshake.cc/teams.html">Teams</a>
    </div>
  </header>

<div class="stream-layout">

  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/WjzjeyYZlSs"
      allowfullscreen>
    </iframe>
  </div>

  <div class="chat">

    <div class="scoreboard">
      <h1 style="text-align: center;">---Leaderboard---</h1>
      <h2 id="scoreboard"></h2>
    </div>
    <!-- <iframe
      src="https://www.youtube.com/live_chat?&v=WjzjeyYZlSs&embed_domain=www.clmilkshake.cc">
    </iframe> -->
  </div>

</div>

<script>
const endpoint = "https://api.clmilkshake.cc/lc"; // Your FastAPI endpoint

fetch(endpoint)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("scoreboard");
    container.innerHTML = "";

    // Convert JSON to array and sort teams by TeamPoints descending
    const teams = Object.entries(data)
      .map(([team, info]) => ({
        team,
        teamPoints: info.TeamPoints || 0,
        players: info.Points || {}
      }))
      .sort((a, b) => b.teamPoints - a.teamPoints);

    teams.forEach(t => {
      const div = document.createElement("div");
      div.classList.add("team", t.team);

      // Team header
      const header = document.createElement("div");
      header.classList.add("team-header");
      header.textContent = `${t.team.charAt(0).toUpperCase() + t.team.slice(1)}: ${t.teamPoints}`;
      div.appendChild(header);

      // Sort players by points descending
      const sortedPlayers = Object.entries(t.players).sort((a, b) => b[1] - a[1]);

      sortedPlayers.forEach(([player, points]) => {
        const p = document.createElement("div");
        p.classList.add("player");
        p.textContent = `${player}: ${points}`;
        div.appendChild(p);
      });

      container.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById("scoreboard").textContent = "Failed to load scoreboard.";
    console.error(err);
  });
</script>
